name: Release TrackOwl

on:
  push:
    tags:
      - 'v*' # Triggers when you push a version tag like v1.2.7 or v1.3.0

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Frontend Dependencies
        run: npm ci

      # Build & Publish Release via tauri-action
      - name: Build & Publish Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signing key config
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          
          # Apple Code Signing & Notarization config (macOS only)
          # To enable official Apple signing in the future, uncomment these lines
          # and add the corresponding secrets to your GitHub repository.
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: v__VERSION__ # Uses package.json version automatically
          releaseName: 'TrackOwl v__VERSION__'
          releaseBody: |
            TrackOwl v__VERSION__ — Desktop App Release.
            
            This release packages TrackOwl for both Windows and macOS platforms.
            - **Windows**: `.exe` and `.msi` installers.
            - **macOS**: `.dmg` Disk Image and `.app` bundles (including signature files for the auto-updater).
          releaseDraft: false
          prerelease: false
