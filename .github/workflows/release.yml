name: Build & Release Electron App

# Triggers:
# - When you push a version tag like `v1.0.0` → builds AND publishes a GitHub Release
# - When you push to main → just builds to check everything compiles (no release)
on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      # 1. Check out your code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Rebuild native modules for Electron (uiohook-napi, active-win)
      - name: Rebuild native modules
        run: npx electron-rebuild

      # 5. Build and publish release (only on version tags)
      - name: Build and Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          # This token lets electron-builder publish to GitHub Releases
          # It's automatically available in GitHub Actions — no setup needed
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Your backend URL — set this in GitHub → Settings → Secrets → Actions
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ADMIN_PORTAL_URL: ${{ secrets.VITE_ADMIN_PORTAL_URL }}
        run: npm run release

      # 5b. Just build (no publish) on regular pushes to main
      - name: Build only (no release)
        if: "!startsWith(github.ref, 'refs/tags/')"
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ADMIN_PORTAL_URL: ${{ secrets.VITE_ADMIN_PORTAL_URL }}
        run: npm run build:electron
